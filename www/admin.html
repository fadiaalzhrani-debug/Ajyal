<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>لوحة تحكم حي أجيال</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="ajyal.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css?v=26" />
<style>
  .adm{max-width:1080px;margin:0 auto;padding:24px 4%}
  .adm-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:22px}
  .adm-head h1{font-size:1.5rem}
  .cloud-pill{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:.85rem;padding:7px 14px;border-radius:100px}
  .cloud-on{background:#dcfce7;color:#166534}.cloud-off{background:#fef9c3;color:#854d0e}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px 20px;box-shadow:var(--shadow-sm)}
  .stat b{font-family:'Cairo';font-size:2rem;color:var(--green-700);display:block;line-height:1}
  .stat span{color:var(--slate);font-size:.92rem}
  .tabs{display:flex;gap:6px;background:#eef3f1;padding:5px;border-radius:12px;width:fit-content;margin-bottom:16px}
  .tabs button{border:none;background:none;font-family:'Tajawal';font-weight:800;font-size:.95rem;padding:9px 20px;border-radius:9px;cursor:pointer;color:var(--slate)}
  .tabs button.active{background:#fff;color:var(--green-700);box-shadow:var(--shadow-sm)}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .toolbar input{flex:1;min-width:200px;padding:11px 14px;border:1.5px solid var(--line);border-radius:11px;font-family:'Tajawal';font-size:1rem;outline:none}
  .toolbar input:focus{border-color:var(--green-500)}
  .tablewrap{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:auto;box-shadow:var(--shadow-sm)}
  table{width:100%;border-collapse:collapse;min-width:620px}
  th,td{text-align:right;padding:13px 16px;border-bottom:1px solid var(--line);font-size:.94rem;white-space:nowrap}
  th{background:#f6f9f8;color:var(--slate);font-weight:800;position:sticky;top:0}
  td{color:var(--ink)}
  tr:last-child td{border-bottom:none}
  .empty{text-align:center;color:var(--slate);padding:40px}
  .gate{max-width:360px;margin:12vh auto;background:#fff;border:1px solid var(--line);border-radius:22px;padding:30px;box-shadow:var(--shadow);text-align:center}
  .gate .logo__mark{margin:0 auto 12px}
  .gate h2{font-size:1.3rem;margin-bottom:6px}
  .gate p{color:var(--slate);font-size:.92rem;margin-bottom:16px}
  .gate input{width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:12px;font-family:'Tajawal';font-size:1.05rem;text-align:center;outline:none;margin-bottom:12px}
  .gate .btn{width:100%}
  .gate .err{color:#dc2626;font-size:.85rem;min-height:18px;margin-bottom:6px}
  .phone-link{color:var(--green-700);font-weight:700}
  .del-btn{border:none;background:#fee2e2;color:#dc2626;font-family:'Tajawal';font-weight:800;font-size:.82rem;
    padding:6px 13px;border-radius:100px;cursor:pointer}
  .del-btn:hover{background:#fecaca}
  .mbd{position:fixed;inset:0;background:rgba(4,36,27,.5);display:none;align-items:center;justify-content:center;z-index:80;padding:18px}
  .mbd.open{display:flex}
  .mdl{background:#fff;border-radius:20px;max-width:440px;width:100%;padding:24px;box-shadow:var(--shadow-lg);max-height:92vh;overflow:auto}
  .mdl h3{font-size:1.25rem;margin-bottom:14px}
  .field{margin-bottom:13px}
  .field label{display:block;font-weight:700;margin-bottom:6px;font-size:.92rem}
  .field input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-family:'Tajawal';font-size:1rem;outline:none}
  .field input:focus{border-color:var(--green-500)}
</style>
</head>
<body>

<!-- بوابة دخول بسيطة (تجريبية) -->
<div id="gate" class="gate">
  <span class="logo__mark"></span>
  <h2>لوحة تحكم أجيال</h2>
  <p>سجّل الدخول بحساب الإدارة.</p>
  <div class="err" id="gErr"></div>
  <input id="gEmail" type="email" placeholder="الإيميل" autocomplete="username" />
  <input id="gCode" type="password" placeholder="كلمة المرور" autocomplete="current-password" />
  <button class="btn btn-primary" id="gBtn">دخول</button>
</div>

<!-- اللوحة -->
<div id="panel" class="adm" style="display:none">
  <div class="adm-head">
    <h1>🗂️ لوحة تحكم حي أجيال</h1>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="cloud-pill" id="cloudPill">…</span>
      <button class="btn btn-ghost" id="logout" style="padding:9px 18px">خروج</button>
      <a href="index.html" class="btn btn-ghost" style="padding:9px 18px">← الموقع</a>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><b id="stReq">0</b><span>طلب / حجز</span></div>
    <div class="stat"><b id="stReg">0</b><span>تسجيل مسابقة</span></div>
    <div class="stat"><b id="stToday">0</b><span>طلبات اليوم</span></div>
  </div>

  <div class="tabs" id="tabs">
    <button data-t="req" class="active">الطلبات والحجوزات</button>
    <button data-t="reg">تسجيلات المسابقات</button>
    <button data-t="sug">الاقتراحات</button>
    <button data-t="event">الفعاليات</button>
    <button data-t="news">الأخبار</button>
    <button data-t="haraj">الحراج</button>
    <button data-t="occ">المناسبات</button>
  </div>

  <div class="toolbar">
    <input id="search" type="search" placeholder="ابحث…" />
    <button class="btn btn-ghost" id="refresh" style="padding:11px 20px">↻ تحديث</button>
    <button class="btn btn-primary" id="addBtn" style="padding:11px 20px;display:none">➕ أضف</button>
    <button class="btn btn-primary" id="export" style="padding:11px 20px">⬇ تصدير CSV</button>
  </div>

  <div class="tablewrap"><table id="tbl"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
</div>

<!-- نافذة إضافة فعالية / خبر -->
<div class="mbd" id="cModal">
  <form class="mdl" id="cForm">
    <h3 id="cTitle">➕ أضف</h3>
    <div class="field"><label>العنوان</label><input id="cT" required placeholder="مثال: مهرجان الحي الصيفي"></div>
    <div class="field"><label>التفاصيل</label><input id="cB" placeholder="وصف مختصر"></div>
    <div class="field"><label>الأيقونة (إيموجي)</label><input id="cE" placeholder="🎪" maxlength="4"></div>
    <div id="evOnly">
      <div class="field"><label>التاريخ</label><input id="cD" type="date"></div>
      <div class="field"><label>الوقت</label><input id="cTime" placeholder="مثال: ٥ عصرًا"></div>
      <div class="field"><label>المكان</label><input id="cP" placeholder="مثال: ميدان الحي"></div>
      <div class="field"><label>التصنيف</label><input id="cC" placeholder="مثال: للعائلة"></div>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%">حفظ</button>
    <button type="button" class="btn btn-ghost" data-close style="width:100%;margin-top:8px">إلغاء</button>
  </form>
</div>

<script src="app.js?v=26"></script>
<script>
/* ====== تسجيل الدخول عبر Supabase (البيانات ما تُقرأ إلا بحساب) ====== */
const gate=document.getElementById('gate'), panel=document.getElementById('panel');
const gErr=document.getElementById('gErr');
function showPanel(){ gate.style.display='none'; panel.style.display='block'; load(); }
async function tryEnter(){
  const email=(document.getElementById('gEmail').value||'').trim();
  const pw=document.getElementById('gCode').value;
  if(!window.AjyalCloud || !window.AjyalCloud.enabled){ gErr.textContent='جارٍ الاتصال بالسحابة… أعد المحاولة بعد لحظة'; return; }
  if(!email || !pw){ gErr.textContent='اكتب الإيميل وكلمة المرور'; return; }
  gErr.textContent='جارٍ الدخول…';
  const r=await window.AjyalCloud.signIn(email,pw);
  if(!r.ok){ gErr.textContent='بيانات الدخول غير صحيحة'; return; }
  gErr.textContent=''; showPanel();
}
document.getElementById('gBtn').addEventListener('click',tryEnter);
document.getElementById('gCode').addEventListener('keydown',e=>{if(e.key==='Enter')tryEnter();});
document.getElementById('gEmail').addEventListener('keydown',e=>{if(e.key==='Enter')tryEnter();});
/* لو الجلسة ما زالت فعّالة، ادخل تلقائيًا */
async function checkSession(){
  if(!window.AjyalCloud || !window.AjyalCloud.enabled) return;
  const u=await window.AjyalCloud.user(); if(u) showPanel();
}
document.addEventListener('ajyal-cloud-ready',checkSession);
setTimeout(checkSession,1200);
document.getElementById('logout').addEventListener('click',async()=>{
  if(window.AjyalCloud && window.AjyalCloud.signOut) await window.AjyalCloud.signOut();
  location.reload();
});

/* ====== البيانات ====== */
let current='req', REQ=[], REG=[], CONTENT=[], HARAJ=[], OCC=[], SUG=[];
const SUG_KINDS=['اقتراح','شكوى','شكر'];
const ls=(k)=>{try{return JSON.parse(localStorage.getItem(k))||[]}catch(e){return[]}};
const fmt=(ts)=>{ if(!ts)return '—'; const d=new Date(ts); return d.toLocaleDateString('ar-SA-u-nu-latn',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('ar-SA-u-nu-latn',{hour:'2-digit',minute:'2-digit'}); };

async function load(){
  const cloud = window.AjyalCloud && window.AjyalCloud.enabled;
  document.getElementById('cloudPill').className='cloud-pill '+(cloud?'cloud-on':'cloud-off');
  document.getElementById('cloudPill').textContent = cloud ? '☁️ متصل بالسحابة' : '💾 وضع تجريبي (هذا الجهاز)';
  if(cloud){
    REQ = (await window.AjyalCloud.list('requests')) || ls('hayna_requests_v1');
    REG = (await window.AjyalCloud.list('registrations')) || ls('hayna_regs_v1');
  } else {
    REQ = ls('hayna_requests_v1').slice().reverse();
    REG = ls('hayna_regs_v1').slice().reverse();
  }
  SUG = (REQ||[]).filter(r=>SUG_KINDS.includes(r.action));                 // الاقتراحات لها تبويبها
  REQ = (REQ||[]).filter(r=>r.action!=='haraj' && r.action!=='occasion' && !SUG_KINDS.includes(r.action));
  if(cloud){
    CONTENT = (await window.AjyalCloud.list('content'))   || [];
    HARAJ   = (await window.AjyalCloud.list('haraj'))     || [];
    OCC     = (await window.AjyalCloud.list('occasions')) || [];
  }
  stats(); render();
}
function stats(){
  document.getElementById('stReq').textContent=REQ.length.toLocaleString('ar-EG');
  document.getElementById('stReg').textContent=REG.length.toLocaleString('ar-EG');
  const today=new Date().toDateString();
  const t=REQ.filter(r=>r.ts && new Date(r.ts).toDateString()===today).length;
  document.getElementById('stToday').textContent=t.toLocaleString('ar-EG');
}
function render(){
  const q=(document.getElementById('search').value||'').trim().toLowerCase();
  const thead=document.getElementById('thead'), tbody=document.getElementById('tbody');
  let rows='';
  if(current==='req'){
    thead.innerHTML='<tr><th>النوع</th><th>الجهة</th><th>الاسم</th><th>الجوال</th><th>تفاصيل</th><th>التاريخ</th></tr>';
    const list=REQ.filter(r=>!q||JSON.stringify(r).toLowerCase().includes(q));
    rows=list.map(r=>`<tr><td>${esc(r.action||'طلب')}</td><td>${esc(r.item||'—')}</td><td>${esc(r.name||'—')}</td>
      <td><a class="phone-link" href="tel:${escPhone(r.phone)}">${esc(r.phone||'—')}</a></td><td>${esc(r.extra||'—')}</td><td>${esc(fmt(r.ts||r.created_at))}</td></tr>`).join('');
  } else if(current==='reg'){
    thead.innerHTML='<tr><th>المشارك</th><th>العمر</th><th>المسابقة</th><th>جوال ولي الأمر</th><th>التاريخ</th></tr>';
    const list=REG.filter(r=>!q||JSON.stringify(r).toLowerCase().includes(q));
    rows=list.map(r=>`<tr><td>${esc(r.name||'—')}</td><td>${esc(r.age||'—')}</td><td>${esc(r.comp||'—')}</td>
      <td><a class="phone-link" href="tel:${escPhone(r.phone)}">${esc(r.phone||'—')}</a></td><td>${esc(fmt(r.ts||r.created_at))}</td></tr>`).join('');
  }
  else if(current==='sug'){
    thead.innerHTML='<tr><th>النوع</th><th>القسم</th><th>الرسالة</th><th>المرسل</th><th>الجوال</th><th>متى</th></tr>';
    const ICO={'اقتراح':'💡','شكوى':'⚠️','شكر':'🌟'};
    const list=SUG.filter(r=>!q||JSON.stringify(r).toLowerCase().includes(q));
    rows=list.map(r=>`<tr><td>${esc((ICO[r.action]||'')+' '+(r.action||'—'))}</td><td>${esc(r.item||'—')}</td>
      <td style="white-space:normal;min-width:280px">${esc(r.extra||'—')}</td>
      <td>${esc(r.name||'—')}</td>
      <td>${r.phone?`<a class="phone-link" href="tel:${escPhone(r.phone)}">${esc(r.phone)}</a>`:'—'}</td>
      <td>${esc(fmt(r.ts||r.created_at))}</td></tr>`).join('');
  }
  else if(current==='event' || current==='news'){
    const isEv = current==='event';
    thead.innerHTML = isEv
      ? '<tr><th>الفعالية</th><th>التاريخ</th><th>الوقت</th><th>المكان</th><th>حذف</th></tr>'
      : '<tr><th>الخبر</th><th>التفاصيل</th><th>النشر</th><th>حذف</th></tr>';
    const list=CONTENT.filter(c=>c.kind===current).filter(c=>!q||JSON.stringify(c).toLowerCase().includes(q));
    rows=list.map(c=> isEv
      ? `<tr><td>${esc((c.emoji||'')+' '+(c.title||'—'))}</td><td>${esc(c.date_at||'—')}</td><td>${esc(c.time_txt||'—')}</td>
         <td>${esc(c.place||'—')}</td><td><button class="del-btn" data-tbl="content" data-id="${esc(c.id)}">حذف</button></td></tr>`
      : `<tr><td>${esc((c.emoji||'')+' '+(c.title||'—'))}</td><td>${esc(c.body||'—')}</td><td>${esc(timeAgo(c.ts))}</td>
         <td><button class="del-btn" data-tbl="content" data-id="${esc(c.id)}">حذف</button></td></tr>`).join('');
  }
  else if(current==='haraj'){
    thead.innerHTML='<tr><th>الإعلان</th><th>النوع</th><th>السعر</th><th>الجوال</th><th>حذف</th></tr>';
    const list=HARAJ.filter(r=>!q||JSON.stringify(r).toLowerCase().includes(q));
    rows=list.map(r=>`<tr><td>${esc((r.emoji||'')+' '+(r.title||'—'))}</td><td>${r.type==='free'?'مجاني':'للبيع'}</td>
      <td>${esc(r.price||0)}</td><td>${esc(r.phone||'—')}</td>
      <td><button class="del-btn" data-tbl="haraj" data-id="${esc(r.id)}">حذف</button></td></tr>`).join('');
  }
  else if(current==='occ'){
    thead.innerHTML='<tr><th>المناسبة</th><th>النوع</th><th>من</th><th>متى</th><th>حذف</th></tr>';
    const KN={birth:'مولود',wedding:'زواج',grad:'تخرّج',cond:'تعزية'};
    const list=OCC.filter(r=>!q||JSON.stringify(r).toLowerCase().includes(q));
    rows=list.map(r=>`<tr><td>${esc(r.who||'—')}</td><td>${esc(KN[r.kind]||r.kind||'—')}</td>
      <td>${esc(r.name||'—')}</td><td>${esc(timeAgo(r.ts))}</td>
      <td><button class="del-btn" data-tbl="occasions" data-id="${esc(r.id)}">حذف</button></td></tr>`).join('');
  }
  tbody.innerHTML = rows || '<tr><td colspan="6" class="empty">لا توجد بيانات بعد</td></tr>';
  document.getElementById('addBtn').style.display = (current==='event'||current==='news') ? '' : 'none';
  document.getElementById('export').style.display = (current==='req'||current==='reg'||current==='sug') ? '' : 'none';
}

/* حذف (فعالية / خبر / إعلان / مناسبة) */
document.getElementById('tbody').addEventListener('click',async e=>{
  const b=e.target.closest('.del-btn'); if(!b) return;
  if(!confirm('متأكد من الحذف؟ ما يمكن التراجع.')) return;
  b.disabled=true; b.textContent='…';
  const ok = await window.AjyalCloud.remove(b.dataset.tbl, b.dataset.id);
  if(ok){ toast('✓ تم الحذف'); load(); }
  else { toast('تعذّر الحذف — تأكد من تشغيل كود الحماية'); b.disabled=false; b.textContent='حذف'; }
});

/* إضافة فعالية / خبر */
const cModal=document.getElementById('cModal');
document.getElementById('addBtn').addEventListener('click',()=>{
  document.getElementById('cTitle').textContent = current==='event' ? '➕ أضف فعالية' : '➕ أضف خبر';
  document.getElementById('evOnly').style.display = current==='event' ? '' : 'none';
  cModal.classList.add('open');
});
cModal.addEventListener('click',e=>{ if(e.target===cModal||e.target.closest('[data-close]')) cModal.classList.remove('open'); });
document.getElementById('cForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const rec={ kind:current, title:clean(cT.value,90), body:clean(cB.value,220),
    emoji:clean(cE.value,4)||(current==='event'?'🎉':'📣'), ts:Date.now() };
  if(current==='event'){
    rec.date_at = cD.value || null;
    rec.time_txt = clean(cTime.value,40);
    rec.place = clean(cP.value,60);
    rec.chip = clean(cC.value,30);
  }
  await window.AjyalCloud.insert('content', rec);
  cModal.classList.remove('open'); e.target.reset();
  toast('✓ تمت الإضافة — بتظهر للجيران'); load();
});
document.getElementById('tabs').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  current=b.dataset.t;
  document.querySelectorAll('#tabs button').forEach(x=>x.classList.toggle('active',x===b));
  render();
});
document.getElementById('search').addEventListener('input',render);
document.getElementById('refresh').addEventListener('click',load);
document.getElementById('export').addEventListener('click',()=>{
  const data = current==='req'?REQ:(current==='sug'?SUG:REG);
  if(!data.length){ toast('لا توجد بيانات للتصدير'); return; }
  const keys=[...new Set(data.flatMap(o=>Object.keys(o)))];
  const csv=[keys.join(',')].concat(data.map(o=>keys.map(k=>`"${(o[k]??'').toString().replace(/"/g,'""')}"`).join(','))).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='ajyal-'+current+'-'+Date.now()+'.csv';a.click();
});
document.addEventListener('ajyal-cloud-ready',load);

</script>
</body>
</html>
