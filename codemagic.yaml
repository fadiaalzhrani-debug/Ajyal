workflows:
  ios-ajyal:
    name: Ajyal iOS (App Store)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: KhafetASC
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.ajyal.app"
      node: 20
      xcode: 15.4
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Generate icons and splash
        script: npx capacitor-assets generate --ios || true
      - name: Add and sync iOS
        script: |
          [ -d ios ] || npx cap add ios
          npx cap sync ios
      - name: Set up signing (create profile automatically)
        script: |
          keychain initialize
          app-store-connect create-bundle-id "$BUNDLE_ID" --name "Ajyal" --platform IOS || true
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
